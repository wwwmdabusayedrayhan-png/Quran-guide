<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>দালিলুল কুরআন – Quran Emotional Guide</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fafafa;
      color: #333;
      padding: 30px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
    }
    .cards {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
    .card {
      padding: 15px 25px;
      border: 2px solid #444;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }
    .card:hover {
      background: #ddd;
    }
    #result {
      margin-top: 25px;
      font-size: 20px;
      font-weight: bold;
      color: #005500;
    }
  </style>
</head>
<body>

  <h1>দালিলুল কুরআন Quranic Emotional Guide</h1>
  <p>আপনার অনুভূতি বেছে নিন — কুরআন আপনার হৃদয়ে কথা বলবে</p>

  <div class="cards">
    <div class="card" onclick="showAyah('peace')">শান্তি</div>
    <div class="card" onclick="showAyah('hope')">আশা</div>
    <div class="card" onclick="showAyah('comfort')">সান্ত্বনা</div>
    <div class="card" onclick="showAyah('gratitude')">কৃতজ্ঞতা</div>
  </div>

  <div id="result"></div>

  <script>
    function showAyah(type) {
      let ayahText = "";
      switch(type) {
        case "peace":
          ayahText = "وَٱلَّذِينَ ءَامَنُوا۟ وَتَطْمَئِنُّ قُلُوبُهُم بِذِكْرِ ٱللَّهِ ۗ - Surah Ar-Ra’d 28";
          break;
        case "hope":
          ayahText = "فَإِنَّ مَعَ ٱلْعُسْرِ يُسْرًا - Surah Ash-Sharh 5";
          break;
        case "comfort":
          ayahText = "أَلَمْ نَشْرَحْ لَكَ صَدْرَكَ - Surah Ash-Sharh 1";
          break;
        case "gratitude":
          ayahText = "وَٱذْكُرُوا۟ نِعْمَتَ ٱللَّهِ عَلَيْكُمْ - Surah An-Nisa 43";
          break;
      }
      document.getElementById("result").innerText = ayahText;
    }
  </script>

</body>
</html>
